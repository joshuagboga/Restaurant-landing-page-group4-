<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant webpage</title>
    <link rel="stylesheet" href="/src/output.css">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- section-1 -->
    <section class="h-screen overflow-x-hidden">
        <div class="bg-amber-600 lg:font-bold md:font-bold sm:font-bold lg:text-7xl md:text-7xl sm:text-9xl ">
            <i
                class="fa-solid fa-pizza-slice text-yellow-300 pl-32 relative left-20 top-16 lg:text-9xl md:text-5xl sm:text-5xl"></i>
            <div class=" text-center">
                <h2 class=" text-amber-50">Crafted with <br> Passion, Served<br>
                    with
                    Love</h2>

                <i class="fa-solid fa-bowl-rice text-yellow-300 text-9xl pl-44 relative left-36 bottom-16"></i>
            </div>
        </div>
        <div class="bg-green-900 text-amber-50 pt-14  ">
            <h3 class="text-5xl text-center pb-10 font-bold">Discover Our Menu</h3>

            <hr class="ml-40 mr-40">

            <div class="grid grid-cols-4 text-center mr-36 ml-36 pt-4 pb-4 ">

                <p class="text-yellow-400">Starters</p>

                <p class="border-l border-l-amber-50 border-l-solid ">Main Course</p>
                <p class="border-l border-l-amber-50 border-l-solid ">Dessert</p>
                <p class="border-l border-l-amber-50 border-l-solid ">Beverges</p>
            </div>

            <hr class="ml-40 mr-40">

            <div class="grid grid-cols-3 ml-32 mr-44 gap-2">
                <div class="border border-amber-50 rounded-lg m-9 p-5 w-72">
                    <img class="w-64 h-64 mb-3 rounded-lg"
                        src="/src/images/side-view-fried-onion-rings-with-ketchup-table.jpg" alt="">
                    <div class="flex justify-between  ">
                        <p class="text-xs">Crispy Calamari Rings </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$40</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>


                <div class="border border-amber-50 rounded-lg m-9 p-5 w-72 ">
                    <img class="w-64 h-64 mb-3 rounded-lg" src="/src/images/delicious-melted-cheese-snack.jpg"
                        alt="menu-2">
                    <div class="flex justify-between">
                        <p class="text-xs">Melted Cheese and meat sauce </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$70</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>

                <div class="border border-amber-50 rounded-lg m-9 p-5 w-72">
                    <img class="w-64 h-64 mb-3 rounded-lg"
                        src="/src/images/vertical-shot-pile-fried-chicken-wings-some-spices-wooden-table.jpg" alt="">
                    <div class="flex justify-between">
                        <p class="text-xs">Fried Chicken Basket </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$80</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
