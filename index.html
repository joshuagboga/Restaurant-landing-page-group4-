<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant webpage</title>
    <link rel="stylesheet" href="/src/output.css">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- section-1 -->
    <section class="h-screen overflow-x-hidden">
        <div class="bg-amber-600 font-bold text-center">
            <i
                class="fa-solid fa-pizza-slice text-yellow-300 sm:text-5xl lg:text-9xl mt-4 relative right-72 top-24"></i>

            <h2 class="text-amber-50 sm:text-7xl md:text-6xl lg:text-7xl mt-4">
                Crafted with <br> Passion, Served<br> with Love
            </h2>

            <i
                class="fa-solid fa-bowl-rice text-yellow-300 sm:text-5xl lg:text-9xl mt-4 relative lg:left-64 lg:bottom-14 sm:left-56"></i>
        </div>
        <div class="bg-green-900 text-amber-50 pt-14  ">
            <h3 class=" text-2xl lg:text-5xl sm:text-3xl text-center pb-10 font-bold">Discover Our Menu</h3>
            <div>
                <hr class="mx-10 sm:mx-20">

                <div class="grid grid-cols-4 text-center mr-36 ml-36 pt-4 pb-4">

                    <p class="text-yellow-400 pl-4 sm:px-3">Starters</p>

                    <p class="border-l border-l-amber-50 border-l-solid">Main Course</p>
                    <p class="border-l border-l-amber-50 border-l-solid">Dessert</p>
                    <p class="border-l border-l-amber-50 border-l-solid  ">Beverges</p>
                </div>

                <hr class="mx-10 sm:mx-20">
            </div>

            <div class="grid grid-cols-3 gap-3 sm:gap-4 lg:gap-6 px-4 sm:px-8 lg:px-32">
                <div class="border border-amber-50 rounded-lg mt-10 mb-10 p-3 sm:p-4 lg:p-5 w-full">
                    <img class="w-full h-28 sm:h-36 lg:h-64 object-cover mb-3 rounded-lg"
                        src="/src/images/side-view-fried-onion-rings-with-ketchup-table.jpg" alt="">
                    <div class="flex justify-between  ">
                        <p class="text-xs text-[10px] sm:text-xs">Crispy Calamari Rings </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$40</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>


                <div class="border border-amber-50 rounded-lg p-3 mt-10 mb-10 sm:p-4 lg:p-5 w-full ">
                    <img class="w-full h-28 sm:h-36 lg:h-64 object-cover mb-3 rounded-lg"
                        src="/src/images/delicious-melted-cheese-snack.jpg" alt="menu-2">
                    <div class="flex justify-between">
                        <p class="text-xs text-[10px] sm:text-xs">Melted Cheese and meat sauce </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$70</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>

                <div class="border border-amber-50 rounded-lg p-3 mt-10 mb-10 sm:p-4 lg:p-5 w-full">
                    <img class="w-full h-28 sm:h-36 lg:h-64 object-cover mb-3 rounded-lg"
                        src="/src/images/vertical-shot-pile-fried-chicken-wings-some-spices-wooden-table.jpg" alt="">
                    <div class="flex justify-between">
                        <p class="text-xs text-[10px] sm:text-xs">Fried Chicken Basket </p>
                        <i class="fa-regular fa-heart"></i>
                    </div>

                    <div class="flex justify-between pt-2">
                        <p>$80</p>
                        <button class="bg-amber-50 rounded-lg text-green-900 w-20 h-7 text-xs">Order Now</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
